services:
  ax-server:
    build: .
    container_name: ax-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
